name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: audio_transcriber
          POSTGRES_USER: transcriber
          POSTGRES_PASSWORD: transcriber
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transcriber -d audio_transcriber"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://transcriber:transcriber@localhost:5432/audio_transcriber
      APP_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Show Python environment
        run: |
          .venv/bin/python --version
          .venv/bin/python -m pip --version

      - name: Install dependencies
        run: .venv/bin/python -m pip install -r requirements.txt

      - name: Run checks
        run: make ci
